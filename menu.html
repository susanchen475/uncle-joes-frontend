<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Menu - Uncle Joe's Coffee Club</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Uncle Joe's Coffee Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="locations.html">Locations</a>
    </nav>
  </header>

  <main>
    <h2>Our Menu</h2>

    <div class="card">
      <input type="text" id="searchInput" placeholder="Search for coffee, tea, or treats..." />
      <button onclick="loadMenu()">Search</button>
      <button onclick="resetMenu()">Reset</button>
    </div>

    <div id="status"></div>
    <div id="menuContainer"></div>
  </main>

  <script>
    const API_BASE = "https://uncle-joes-api-556060884056.us-central1.run.app";

    function groupByCategory(items) {
      const grouped = {};
      items.forEach(item => {
        const category = item.category || "Other";
        if (!grouped[category]) grouped[category] = [];
        grouped[category].push(item);
      });
      return grouped;
    }

    async function loadMenu() {
      const status = document.getElementById("status");
      const container = document.getElementById("menuContainer");
      const searchInput = document.getElementById("searchInput");
      
      // Safety check: make sure the input exists before reading it
      const keyword = searchInput ? searchInput.value.trim().toLowerCase() : "";

      status.innerHTML = '<div class="loading">Loading menu...</div>';
      container.innerHTML = "";

      try {
        const response = await fetch(`${API_BASE}/menu`);
        if (!response.ok) throw new Error("Failed to load menu data.");
        let data = await response.json();

        status.innerHTML = "";

        // Client-side filtering
        if (keyword) {
          data = data.filter(item => 
            item.name.toLowerCase().includes(keyword) || 
            (item.description && item.description.toLowerCase().includes(keyword)) ||
            item.category.toLowerCase().includes(keyword)
          );
        }

        if (data.length === 0) {
          status.innerHTML = '<div class="empty">No menu items match your search.</div>';
          return;
        }

        const grouped = groupByCategory(data);

        Object.keys(grouped).sort().forEach(category => {
          const section = document.createElement("section");
          section.className = "category-section";

          const heading = document.createElement("h3");
          heading.className = "category-title";
          heading.textContent = category;
          section.appendChild(heading);

          const grid = document.createElement("div");
          grid.className = "grid";

          grouped[category].forEach(item => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
              <h3>${item.name}</h3>
              <p>${item.description || ''}</p>
              <p><strong>Size:</strong> ${item.size || 'Standard'}</p>
              <p><strong>Calories:</strong> ${item.calories || 'N/A'}</p>
              <p><strong>Price:</strong> $${Number(item.price).toFixed(2)}</p>
              <p class="small"><strong>ID:</strong> ${item.id}</p>
            `;
            grid.appendChild(card);
          });

          section.appendChild(grid);
          container.appendChild(section);
        });
      } catch (error) {
        status.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    function resetMenu() {
      const searchInput = document.getElementById("searchInput");
      if (searchInput) searchInput.value = "";
      loadMenu();
    }

    // Initial load
    loadMenu();
  </script>
</body>
</html>
