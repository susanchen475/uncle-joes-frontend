<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locations - Uncle Joe's Coffee Club</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Uncle Joe's Coffee Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="locations.html">Locations</a>
    </nav>
  </header>

  <main>
    <h2>Our Locations</h2>

    <div class="card">
      <input type="text" id="stateInput" placeholder="Enter State (e.g. IN)" />
      <button onclick="loadLocations()">Search</button>
      <button onclick="resetLocations()">Reset</button>
    </div>

    <div id="status"></div>
    <div id="locationsContainer" class="grid"></div>
  </main>

  <script>
    const API_BASE = "https://uncle-joes-api-556060884056.us-central1.run.app";
    let currentLocations = []; 

    async function loadLocations() {
      const status = document.getElementById("status");
      const container = document.getElementById("locationsContainer");
      const stateField = document.getElementById("stateInput");
      
      const searchTerm = stateField ? stateField.value.trim() : "";
      const searchTermLower = searchTerm.toLowerCase();

      status.innerHTML = '<div class="loading">Searching locations...</div>';
      container.innerHTML = "";

      // Calls the backend search endpoint
      let url = searchTerm 
        ? `${API_BASE}/locations/search?query_str=${encodeURIComponent(searchTerm)}`
        : `${API_BASE}/locations`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Could not reach the location database.");
        
        let data = await response.json(); 

        // --- SMART FILTER LOGIC ---
        // If searching a 2-letter state code, filter out "accidental" matches 
        // from other states that just happened to have those letters in the city name.
        if (searchTerm.length === 2) {
          data = data.filter(loc => loc.state && loc.state.toLowerCase() === searchTermLower);
        }

        status.innerHTML = "";

        if (data.length === 0) {
          status.innerHTML = `<div class="error">No shops found exactly in "${searchTerm.toUpperCase()}".</div>`;
          return;
        }

        currentLocations = data; // Save to local cache for the hours popup

        data.forEach(loc => {
          const card = document.createElement("div");
          card.className = "card";
          
          const wifiIcon = loc.wifi ? "✅ Wi-Fi" : "❌ No Wi-Fi";
          const driveThruIcon = loc.drive_thru ? "🚗 Drive-Thru" : "🚶 Walk-in Only";
          const doorDashIcon = loc.door_dash ? "🚲 DoorDash Available" : "🏠 In-store Only";

          card.innerHTML = `
            <h3>${loc.city}, ${loc.state}</h3>
            <p><strong>Address:</strong><br>${loc.address_one || 'Address Pending'}</p>
            
            <div class="amenities-box" style="background: #f4f4f4; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9em;">
              <p style="margin: 5px 0;">${wifiIcon}</p>
              <p style="margin: 5px 0;">${driveThruIcon}</p>
              <p style="margin: 5px 0;">${doorDashIcon}</p>
            </div>

            <button onclick="viewStoreDetails('${loc.id}')" style="width: 100%; padding: 10px; cursor: pointer;">View Hours & Contact</button>
            <p class="small" style="margin-top: 10px;"><strong>Store ID:</strong> ${loc.id}</p>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        status.innerHTML = `<div class="error">${error.message}</div>`;
      }
    }

    function viewStoreDetails(locationId) {
      const data = currentLocations.find(l => l.id === locationId);
      if (!data) return;

      const formatTime = (time) => {
          if (time === null || time === undefined) return "Closed";
          const s = time.toString();
          return s.length <= 2 ? `0:${s.padStart(2, '0')}` : `${s.slice(0, -2)}:${s.slice(-2)}`;
      };

      const hours = `
Monday: ${formatTime(data.hours_monday_open)} - ${formatTime(data.hours_monday_close)}
Tuesday: ${formatTime(data.hours_tuesday_open)} - ${formatTime(data.hours_tuesday_close)}
Wednesday: ${formatTime(data.hours_wednesday_open)} - ${formatTime(data.hours_wednesday_close)}
Thursday: ${formatTime(data.hours_thursday_open)} - ${formatTime(data.hours_thursday_close)}
Friday: ${formatTime(data.hours_friday_open)} - ${formatTime(data.hours_friday_close)}
Saturday: ${formatTime(data.hours_saturday_open)} - ${formatTime(data.hours_saturday_close)}
Sunday: ${formatTime(data.hours_sunday_open)} - ${formatTime(data.hours_sunday_close)}
      `.trim();

      alert(
        `Uncle Joe's - ${data.city}\n` +
        `Phone: ${data.phone_number || 'N/A'}\n\n` +
        `HOURS:\n${hours}`
      );
    }

    function resetLocations() {
      const input = document.getElementById("stateInput");
      if (input) input.value = "";
      loadLocations();
    }

    // Initial load when the page opens
    loadLocations();
  </script>
</body>
</html>
