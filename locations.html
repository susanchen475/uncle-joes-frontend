<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locations - Uncle Joe's Coffee Club</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Uncle Joe's Coffee Club</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="menu.html">Menu</a>
      <a href="locations.html">Locations</a>
    </nav>
  </header>

  <main>
    <h2>Locations</h2>

    <div class="card">
      <input type="text" id="stateInput" placeholder="Filter by state (ex: IN)" />
      <button onclick="loadLocations()">Search</button>
      <button onclick="resetLocations()">Reset</button>
      <p class="small">Tip: enter a two-letter state abbreviation to narrow results.</p>
    </div>

    <div id="status"></div>
    <div id="locationsContainer" class="grid"></div>
  </main>

<script>
  const API_BASE = "https://uncle-joes-api-556060884056.us-central1.run.app";

  async function loadLocations() {
    const status = document.getElementById("status");
    const container = document.getElementById("locationsContainer");
    const state = document.getElementById("stateInput").value.trim();

    status.innerHTML = '<div class="loading">Searching locations...</div>';
    container.innerHTML = "";

    // 1. Corrected URL Path
    let url = `${API_BASE}/locations/filter/state/${state || 'IN'}`;

    try {
      const response = await fetch(url);
      if (!response.ok) throw new Error("Could not find locations for that state.");
      const data = await response.json();

      status.innerHTML = "";

      data.forEach(loc => {
        const card = document.createElement("div");
        card.className = "card";
        
        // 2. Corrected Amenities Mapping (Matches backend 'services' object)
        const wifi = loc.services.free_wifi ? "✅ Wi-Fi" : "❌ No Wi-Fi";
        const driveThru = loc.services.drive_thru ? "🚗 Drive-Thru" : "🚶 Walk-in Only";
        const delivery = loc.services.doordash_available ? "🚲 DoorDash" : "🏠 In-store Only";

        card.innerHTML = `
          <h3>${loc.city}</h3>
          <p><strong>Address:</strong><br>${loc.address}</p>
          
          <div class="amenities-box" style="background: #f4f4f4; padding: 10px; border-radius: 5px; margin: 10px 0; font-size: 0.9em;">
            <p style="margin: 5px 0;">${wifi}</p>
            <p style="margin: 5px 0;">${driveThru}</p>
            <p style="margin: 5px 0;">${delivery}</p>
          </div>

          <button onclick="viewStoreDetails('${loc.id}')" style="width: 100%; padding: 10px; cursor: pointer;">View Hours & Contact</button>
          <p class="small" style="margin-top: 10px;"><strong>Store ID:</strong> ${loc.id}</p>
        `;
        container.appendChild(card);
      });
    } catch (error) {
      status.innerHTML = `<div class="error">${error.message}</div>`;
    }
  }

  // 3. New Detail Function (Fetches formatted hours from the backend)
  async function viewStoreDetails(locationId) {
    try {
      const response = await fetch(`${API_BASE}/locations/${locationId}`);
      const data = await response.json();
      
      let hoursString = "";
      for (const [day, time] of Object.entries(data.operating_hours)) {
        hoursString += `${day}: ${time}\n`;
      }

      alert(
        `Uncle Joe's - ${data.store_info.name}\n` +
        `Phone: ${data.store_info.phone}\n` +
        `Email: ${data.store_info.email}\n\n` +
        `HOURS:\n${hoursString}`
      );
    } catch (error) {
      alert("Error loading store details.");
    }
  }

  function resetLocations() {
    document.getElementById("stateInput").value = "";
    loadLocations();
  }

  loadLocations();
</script>
