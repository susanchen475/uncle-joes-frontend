<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Uncle Joe's Coffee</title>
    <link rel="stylesheet" href="styles.css"> <style>
        .login-container { max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; }
        .error { color: red; display: none; margin-top: 10px; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Home</a> | 
        <a href="menu.html">Menu</a> | 
        <a href="locations.html">Locations</a>
    </nav>

    <div class="login-container">
        <h2>Coffee Club Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit">Log In</button>
            <div id="login-error" class="error">Invalid email or password.</div>
        </form>
    </div>

    <script>
        // 
        const API_BASE_URL = "https://uncle-joes-frontend-556060884056.us-central1.run.app"; 

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent the page from refreshing
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');

            try {
                const response = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    // Save the member_id to keep the user logged in
                    sessionStorage.setItem('member_id', data.member_id);
                    // Redirect to the dashboard
                    window.location.href = 'dashboard.html';
                } else {
                    errorDiv.style.display = 'block';
                }
            } catch (error) {
                console.error("Login failed:", error);
                errorDiv.innerText = "Connection error. Please try again.";
                errorDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
